<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Buy the Dip · Mockups</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:ui-sans-serif,system-ui,sans-serif;background:#111;color:#eee;padding:24px}
  h1{font-weight:600;font-size:18px;letter-spacing:.04em;margin-bottom:14px}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;height:calc(100vh - 90px)}
  .card{display:flex;flex-direction:column;border:1px solid #333;background:#1a1a1a;border-radius:6px;overflow:hidden}
  .card .head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;font-size:12px}
  .card .head a{color:#9cf;text-decoration:none;font-size:11px}
  .card iframe{flex:1;border:0;background:#000;transform:scale(.5);transform-origin:0 0;width:200%;height:200%}
  .frame{flex:1;overflow:hidden;position:relative}
</style></head>
<body>
  <h1>Buy the Dip · Three design directions</h1>
  <div class="row">
    <div class="card">
      <div class="head"><span><b>A.</b> Terminal Reborn — dark, dense, signal-green</span><a href="a-terminal.html" target="_blank">open ↗</a></div>
      <div class="frame"><iframe src="a-terminal.html"></iframe></div>
    </div>
    <div class="card">
      <div class="head"><span><b>B.</b> Editorial Dispatch — paper, serif, oxblood</span><a href="b-editorial.html" target="_blank">open ↗</a></div>
      <div class="frame"><iframe src="b-editorial.html"></iframe></div>
    </div>
    <div class="card">
      <div class="head"><span><b>C.</b> Brutalist Trader — bone, black, neon red</span><a href="c-brutalist.html" target="_blank">open ↗</a></div>
      <div class="frame"><iframe src="c-brutalist.html"></iframe></div>
    </div>
  </div>
</body></html>
